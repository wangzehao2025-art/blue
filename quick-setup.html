<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>一键全自动配置</title>
<style>
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;max-width:760px;margin:30px auto;padding:30px;background:#f9fafb;color:#111827;line-height:1.7}
h1{font-size:24px;margin-bottom:14px}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 4px 12px rgba(0,0,0,.06);margin-bottom:16px}
.success{color:#10b981;font-weight:600}
.warn{color:#f59e0b}
.error{color:#ef4444}
.muted{color:#6b7280}
.btn{display:inline-block;padding:11px 22px;background:#2563eb;color:#fff;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px;font-family:inherit}
.btn:hover{background:#1d4ed8}
.btn.secondary{background:#6b7280}
.btn.success-btn{background:#10b981}
code{background:#f3f4f6;padding:2px 6px;border-radius:3px;font-family:Consolas,monospace;font-size:13px}
#log{background:#0f172a;color:#e2e8f0;padding:14px;border-radius:6px;font-family:Consolas,monospace;font-size:12.5px;line-height:1.7;margin-top:14px;min-height:400px;white-space:pre-wrap;max-height:600px;overflow-y:auto}
.checklist{list-style:none;padding:0;margin:0}
.checklist li{padding:6px 0;font-size:13.5px}
</style>
</head>
<body>
<div class="card">
  <h1>⚡ 一键全自动配置 (V3)</h1>
  <p class="muted">点击下方按钮,将自动完成:</p>
  <ul class="checklist">
    <li>✅ DeepSeek API (AI 顾问主推理)</li>
    <li>✅ 智谱 GLM-4-Plus (国内联网备用)</li>
    <li>✅ Cloudflare Worker 代理 (CORS / 反爬)</li>
    <li>✅ 预置 5 个验证过的可用数据源 (通过 Worker 代理)</li>
    <li>✅ 启用 TrendRadar 默认仓库模式</li>
    <li>✅ 跳转到 AI 顾问并自动跑示例问题</li>
  </ul>
  <div id="log">点击下方按钮开始...</div>
  <div style="margin-top:16px">
    <button class="btn" id="goBtn">🚀 一键全自动配置 + 跳转</button>
    <button class="btn secondary" onclick="window.location.href='index.html'">手动跳转 (不配置)</button>
  </div>
</div>

<script>
const LOG = document.getElementById('log');
function log(msg, cls){
  LOG.innerHTML += (cls?'<span class="'+cls+'">'+msg+'</span>':msg) + '\n';
  LOG.scrollTop = LOG.scrollHeight;
}

// ⚠️ 把下面 4 个值替换成你自己的 API Keys (从各家官网申请)
// 详见 README.md 的"快速开始"章节
const CONFIG = {
  deepseekKey: 'sk-YOUR_DEEPSEEK_KEY_HERE',       // https://platform.deepseek.com
  zhipuKey: 'YOUR_ZHIPU_KEY_HERE',                // https://open.bigmodel.cn
  workerUrl: 'https://YOUR-WORKER.workers.dev',   // 自建 Cloudflare Worker (可选)
  workerToken: 'YOUR_WORKER_TOKEN_HERE'           // Worker 的 SECRET_TOKEN
};

// 预置数据源 (基于实测验证,通过 Worker 代理可用)
const PRESET_SOURCES = [
  {
    name: 'GitHub API - TrendRadar 仓库信息',
    endpoint: 'https://api.github.com/repos/sansan0/TrendRadar',
    method: 'GET',
    responseType: 'json',
    note: '✅ 验证通过 (HTTP 200)。返回 TrendRadar 项目元数据,可用于测试连通性'
  },
  {
    name: 'Hacker News - 热门话题 (跨境必看)',
    endpoint: 'https://hacker-news.firebaseio.com/v0/topstories.json',
    method: 'GET',
    responseType: 'json',
    note: '✅ 验证通过。HN Top Stories ID 列表,可关注科技+消费趋势'
  },
  {
    name: 'GitHub Trending API (今日热门项目)',
    endpoint: 'https://api.github.com/search/repositories?q=created:>2024-01-01&sort=stars&order=desc&per_page=20',
    method: 'GET',
    responseType: 'json',
    jsonPath: 'items',
    note: '✅ 通过 GitHub 官方 API 看本年度最火项目'
  },
  {
    name: 'Product Hunt (新品发布)',
    endpoint: 'https://www.producthunt.com/feed',
    method: 'GET',
    responseType: 'rss',
    note: '✅ Product Hunt RSS, 全球新产品发布跨境选品参考'
  },
  {
    name: 'V2EX 最新主题 RSS',
    endpoint: 'https://www.v2ex.com/index.xml',
    method: 'GET',
    responseType: 'rss',
    note: '✅ V2EX 程序员社区 RSS, 反映科技人群关注'
  }
];

document.getElementById('goBtn').addEventListener('click', async () => {
  LOG.innerHTML = '';
  log('🔧 开始全自动配置...\n');

  try {
    // === 1. DeepSeek ===
    log('═══ Step 1: 配置 DeepSeek (AI 顾问主推理) ═══');
    const aiCfg = {
      provider: 'deepseek',
      apiKey: CONFIG.deepseekKey,
      baseUrl: 'https://api.deepseek.com/v1',
      model: 'deepseek-chat',
      temperature: 0.3,
      maxTokens: 3000,
      system: '你是一位资深电商选品负责人,擅长全类目蓝海选品分析。请基于用户提供的信息给出客观、可执行的选品建议。不要给出"必爆/100%有效/保证赚钱"等夸张承诺。涉及食品/药品/医疗/化妆品等高风险类目时,明确提示合规风险。'
    };
    localStorage.setItem('bo_aiConfig', JSON.stringify(aiCfg));
    const dsRes = await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aiCfg.apiKey},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:'reply OK'}],max_tokens:10})});
    if(dsRes.ok){const d=await dsRes.json();log('✅ DeepSeek 连接成功 · 响应: '+d.choices[0].message.content,'success')}
    else log('⚠️ DeepSeek 失败: '+dsRes.status,'warn');

    // === 2. 智谱 ===
    log('\n═══ Step 2: 配置智谱 GLM (国内联网备用) ═══');
    const feedsCfg = {
      provider: 'zhipu',
      apiKey: CONFIG.zhipuKey,
      baseUrl: 'https://open.bigmodel.cn/api/paas/v4',
      model: 'glm-4-plus',
      temperature: 0.2,
      maxTokens: 2500,
      searchRecency: 'month',
      autoSaveToCandidate: false
    };
    localStorage.setItem('bo_feedsConfig', JSON.stringify(feedsCfg));
    const glmRes = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+feedsCfg.apiKey},body:JSON.stringify({model:'glm-4-plus',messages:[{role:'user',content:'reply OK'}],max_tokens:10})});
    if(glmRes.ok){const d=await glmRes.json();log('✅ 智谱 GLM 连接成功 · 模型: '+d.model,'success')}
    else log('⚠️ 智谱失败: '+glmRes.status,'warn');

    // === 3. Cloudflare Worker ===
    log('\n═══ Step 3: 配置 Cloudflare Worker (代理) ═══');
    const proxyTemplate = CONFIG.workerUrl + '/?url={url}&token=' + CONFIG.workerToken;
    const saasCfg = {
      sources: PRESET_SOURCES.map(s => ({
        id: Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4),
        name: s.name,
        endpoint: s.endpoint,
        method: s.method,
        headers: '',
        body: '',
        jsonPath: s.jsonPath || '',
        proxyUrl: '',
        responseType: s.responseType,
        cssSelector: '',
        attrMap: '',
        enabled: true,
        note: s.note
      })),
      defaultProxy: proxyTemplate,
      proxyToken: CONFIG.workerToken
    };
    localStorage.setItem('bo_saasConfig', JSON.stringify(saasCfg));
    log('✅ Worker URL: '+CONFIG.workerUrl,'success');
    log('✅ Token 长度: '+CONFIG.workerToken.length+' 位');
    log('✅ 预置数据源: '+PRESET_SOURCES.length+' 个');

    log('\n🔌 测试 Worker 连通性...');
    const wRes = await fetch(CONFIG.workerUrl+'/');
    if(wRes.ok){const d=await wRes.json();log('✅ Worker 在线 · service: '+d.service+' · v'+d.version,'success')}
    else log('⚠️ Worker 异常: '+wRes.status,'warn');

    log('\n🔌 测试代理拉取真实数据...');
    const testRes = await fetch(CONFIG.workerUrl+'/?url='+encodeURIComponent('https://api.github.com/repos/sansan0/TrendRadar')+'&token='+CONFIG.workerToken);
    if(testRes.ok){const d=await testRes.json();log('✅ 代理拉取成功 · TrendRadar 项目: ⭐ '+d.stargazers_count+' stars','success')}
    else log('⚠️ 代理测试失败: '+testRes.status,'warn');

    // === 4. TrendRadar ===
    log('\n═══ Step 4: TrendRadar 默认仓库模式 ═══');
    const trCfg = {
      githubUser:'sansan0',
      githubRepo:'TrendRadar',
      branch:'master',
      useDefaultRepo:true,
      selectedPlatforms:['weibo','douyin','toutiao','baidu','zhihu','bilibili','36kr','kuaishou'],
      lastFetchDate:'',lastFetchData:null,autoFetchOnInit:false
    };
    localStorage.setItem('bo_trendRadar', JSON.stringify(trCfg));
    log('✅ TrendRadar 默认指向 sansan0/TrendRadar (master 分支)','success');
    log('   ⚠️ 注意: 该项目实际用 SQLite 存储,跑工具时会尝试 fallback');

    // === 5. 标记完成 ===
    log('\n═══ Step 5: 完成标记 ═══');
    localStorage.setItem('bo_welcomed', '1');
    log('✅ 全部完成!','success');

    log('\n🎯 4 秒后跳转到 AI 顾问 + 自动跑示例对话...','success');
    log('   示例: 推荐 3 个低风险宠物用品方向');

    setTimeout(() => {
      window.location.href = 'index.html?demo=1';
    }, 4000);

  } catch (e) {
    log('❌ 失败: '+e.message,'error');
    log('请检查网络连接');
  }
});

window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('goBtn').click(), 300);
});
</script>
</body>
</html>
